<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@100..900&display=swap&family=Noto+Sans+KR:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />

    <title>예진이가 만든 거</title>
  </head>
  <body>
    <div id="mobile-warnig">
      <h2>Please use a PC.</h2>
      <p>This project is optimized for desktop screens.</p>
    </div>
    <div id="app">
      <form id="login-form" class="hidden">
        <input required maxlength="10" type="text" placeholder="Name" />
        <input type="submit" value="♥" />
      </form>
      <h2 id="clock">00:00:00</h2>
      <h1 id="greeting" class="hidden"></h1>
      <form id="todo-form">
        <input type="text" placeholder="To Do" />
      </form>
      <ul id="todo-list"></ul>
      <div id="quote">
        <span></span>
        <span></span>
      </div>
      <div id="weather">
        <span></span>
        <span></span>
      </div>
      <div id="memo">
        <span>memo</span>
        <i class="fa-regular fa-note-sticky fa-lg"></i>
      </div>
      <form id="memo-form" class="hidden">
        <input type="text" placeholder="Write something..." />
      </form>
    </div>
    <script src="js/greetings.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/background.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/weather.js"></script>
  </body>
</html>
